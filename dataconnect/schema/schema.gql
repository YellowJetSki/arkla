type User @table {
  displayName: String!
  createdAt: Timestamp!
  email: String
  photoUrl: String
}

type Campaign @table {
  user: User!
  name: String!
  createdAt: Timestamp!
  description: String
  setting: String
}

type Session @table {
  campaign: Campaign!
  sessionNumber: Int!
  sessionDate: Date!
  createdAt: Timestamp!
  summary: String
}

type Npc @table {
  campaign: Campaign!
  name: String!
  createdAt: Timestamp!
  description: String
  alignment: String
  status: String
}

type Location @table {
  campaign: Campaign!
  name: String!
  createdAt: Timestamp!
  description: String
  type: String
}